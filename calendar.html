<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>יומן משימות</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="יומן">
<meta name="theme-color" content="#f0ede8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23a07828'/><text y='72' x='50' text-anchor='middle' font-size='60'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #f0ede8;
    --bg-deep: #f7f5f2;
    --bg-card: #ffffff;
    --bg-hover: #f5f2ee;
    --bg-glass: rgba(0,0,0,0.02);
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.18);
    --gold: #a07828;
    --gold-dim: rgba(160,120,40,0.1);
    --gold-glow: rgba(160,120,40,0.25);
    --ember: #c0392b;
    --ember-dim: rgba(192,57,43,0.1);
    --sapphire: #2563b0;
    --sapphire-dim: rgba(37,99,176,0.1);
    --jade: #1a8a5a;
    --jade-dim: rgba(26,138,90,0.1);
    --text-prime: #1a1714;
    --text-sec: #6b6560;
    --text-mute: #a09890;
    --text-holiday: #a07828;
    --today-ring: #a07828;
    --shadow-deep: 0 20px 60px rgba(0,0,0,0.15);
    --shadow-card: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg-void);
    color: var(--text-prime);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* === HEADER === */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(240,237,232,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), #6b4f10);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--gold-glow);
  }

  .logo-text {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-prime);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-top: -4px;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .nav-btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--text-prime); background: var(--bg-hover); }

  .nav-btn.active {
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.2);
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .arrow-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-sec);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .arrow-btn:hover { border-color: var(--gold); color: var(--gold); }

  .current-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-prime);
    min-width: 130px;
    text-align: center;
    cursor: pointer;
  }

  .today-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .today-btn:hover { border-color: var(--gold); color: var(--gold); }

  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--gold), #7a5010);
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px var(--gold-glow);
    white-space: nowrap;
  }

  .add-task-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--gold-glow); }

  /* === MAIN LAYOUT === */
  .app-body {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* === HOLIDAY BANNER === */
  .holiday-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.02));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 12px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeSlide 0.4s ease;
  }

  .holiday-banner:empty { display: none; }

  .holiday-star { font-size: 20px; }

  .holiday-text { font-size: 14px; color: var(--gold); font-weight: 600; }

  .holiday-date { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === VIEWS === */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === DAY VIEW === */
  .day-view {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
  }

  .day-sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .day-date-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }

  .day-number {
    font-size: 64px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    font-family: 'Frank Ruhl Libre', serif;
  }

  .day-name { font-size: 18px; color: var(--text-prime); font-weight: 600; margin-top: 6px; }
  .day-month { font-size: 13px; color: var(--text-sec); }
  .day-hebrew { font-size: 12px; color: var(--gold); margin-top: 8px; opacity: 0.8; }

  .day-tasks-count {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .count-num { font-size: 32px; font-weight: 800; color: var(--text-prime); }
  .count-label { font-size: 12px; color: var(--text-sec); }

  .day-timeline {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .timeline-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .timeline-body { padding: 0; }

  .time-slot {
    display: flex;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
    min-height: 56px;
    position: relative;
    transition: background 0.2s;
  }

  .time-slot:hover { background: var(--bg-hover); }

  .time-slot:last-child { border-bottom: none; }

  .time-label {
    width: 60px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 500;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
  }

  .time-content {
    flex: 1;
    padding: 6px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .task-chip {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    border-right: 3px solid;
    position: relative;
  }

  .task-chip:hover { filter: brightness(1.15); }

  .task-chip.priority-high { background: var(--ember-dim); border-color: var(--ember); color: #9a1c0a; }
  .task-chip.priority-medium { background: var(--gold-dim); border-color: var(--gold); color: #7a5010; }
  .task-chip.priority-low { background: var(--sapphire-dim); border-color: var(--sapphire); color: #1a4a90; }
  .task-chip.done { opacity: 0.4; text-decoration: line-through; }

  .task-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 10px;
  }

  .task-delete {
    margin-right: auto;
    opacity: 0;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-mute);
    transition: opacity 0.2s;
  }

  .task-chip:hover .task-delete { opacity: 1; }

  /* === WEEK VIEW — Notebook Style (matches reference image) === */

  /* Full-width, no sidebar — override layout-with-sidebar for week */
  #view-week .layout-with-sidebar {
    display: block;
  }

  .week-notebook {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-card);
  }

  /* Each day card */
  .wn-day {
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
  }

  /* Right column cards have no left border (they're on the edge) */
  .wn-day:nth-child(odd) { border-left: none; }

  /* Remove bottom border from last two cells */
  .wn-day:nth-last-child(1),
  .wn-day:nth-last-child(2) { border-bottom: none; }

  /* Today highlight */
  .wn-day.wn-today { background: #fdfaf3; }

  /* Subtle holiday strip shown below day header */
  .wn-holiday-strip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 14px 5px;
    background: linear-gradient(135deg, rgba(160,120,40,0.07), rgba(160,120,40,0.02));
    border-bottom: 1px solid rgba(160,120,40,0.15);
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.1px;
  }

  .wn-holiday-strip .hol-icon { font-size: 12px; }
  .wn-holiday-strip .hol-name { opacity: 0.9; }

  @media (max-width: 640px) {
    .wn-holiday-strip { font-size: 10px; padding: 3px 8px 4px; }
    .wn-holiday-strip .hol-icon { font-size: 10px; }
  }

  /* Day header */
  .wn-header {
    padding: 10px 14px 8px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.12s;
    background: inherit;
  }

  .wn-header:hover { background: var(--bg-hover); }

  .wn-day-label {
    font-size: 15px;
    font-weight: 800;
    color: var(--text-prime);
    font-family: 'Frank Ruhl Libre', serif;
    letter-spacing: -0.2px;
  }

  .wn-today .wn-day-label { color: var(--text-prime); }

  /* Bold black square indicator like in image */
  .wn-today-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--text-prime);
    border-radius: 1px;
    margin-left: 5px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .wn-hol-badge {
    font-size: 10px;
    color: var(--gold);
    font-weight: 700;
    background: var(--gold-dim);
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 6px;
  }

  .wn-add-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-mute);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .wn-add-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Notebook lines area */
  .wn-lines {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Each line — either a task or an empty ruled line */
  .wn-line {
    min-height: 36px;
    height: auto;
    border-bottom: 1px solid #e8e4de;
    display: flex;
    align-items: flex-start;
    padding: 7px 14px;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
  }

  .wn-line:last-child { border-bottom: none; }
  .wn-line:hover { background: #faf8f4; }
  .wn-line.wn-line-empty:hover::after {
    content: '+ הוסף משימה';
    font-size: 11px;
    color: var(--text-mute);
    position: absolute;
    left: 14px;
  }

  /* Task inside a line */
  .wn-task-inner {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    min-width: 0;
  }

  .wn-check {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 1.5px solid #bbb;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s;
    color: transparent;
  }

  .wn-check.checked { background: var(--jade); border-color: var(--jade); color: #fff; }
  .wn-check:hover { border-color: var(--gold); }

  .wn-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .wn-dot.high { background: var(--ember); }
  .wn-dot.medium { background: var(--gold); }
  .wn-dot.low { background: var(--sapphire); }

  .wn-task-text {
    flex: 1;
    font-size: 13px;
    color: var(--text-prime);
    font-weight: 500;
    white-space: normal;
    overflow: visible;
    word-break: break-word;
    direction: rtl;
    text-align: right;
  }

  .wn-task-text.done-text {
    text-decoration: line-through;
    color: var(--text-mute);
  }

  .wn-task-time {
    font-size: 10px;
    color: var(--text-mute);
    flex-shrink: 0;
    background: var(--bg-void);
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .wn-del {
    opacity: 0;
    font-size: 11px;
    color: var(--text-mute);
    cursor: pointer;
    flex-shrink: 0;
    padding: 2px 4px;
    border-radius: 3px;
    transition: opacity 0.12s;
  }

  .wn-line:hover .wn-del { opacity: 1; }
  .wn-del:hover { color: var(--ember); }

  /* Inline quick-add input inside a ruled line */
  .wn-inline-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-prime);
    direction: rtl;
    text-align: right;
    width: 100%;
    caret-color: var(--gold);
  }

  @media (max-width: 640px) {
    .wn-inline-input { font-size: 11px; }
  }

  .wn-line.wn-editing {
    background: #fffdf5;
    border-bottom-color: var(--gold);
  }

  /* Responsive — week always 2 columns, even on mobile */
  @media (max-width: 640px) {
    /* Force 2 columns on mobile — never collapse to 1 */
    .week-notebook {
      grid-template-columns: 1fr 1fr;
    }

    /* Tighten header on small screens */
    .wn-header {
      padding: 7px 8px 6px;
    }

    .wn-day-label {
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .wn-add-btn {
      width: 18px;
      height: 18px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .wn-hol-badge {
      display: none; /* hide holiday badge on tiny screens to save space */
    }

    /* Shorter lines on mobile */
    .wn-line {
      min-height: 28px;
      height: auto;
      padding: 5px 7px;
    }

    .wn-task-text {
      font-size: 11px;
    }

    .wn-check {
      width: 13px;
      height: 13px;
      font-size: 8px;
    }

    .wn-dot {
      width: 4px;
      height: 4px;
    }

    .wn-task-time { display: flex; }
    .wn-del { display: none; }

    /* Keep border logic correct for 2-col layout */
    .wn-day:nth-child(odd) { border-left: none; }
    .wn-day:nth-child(even) { border-left: 1px solid var(--border); }
    .wn-day:nth-last-child(1),
    .wn-day:nth-last-child(2) { border-bottom: none; }
  }

  /* === MONTH VIEW === */
  .month-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .month-day-name {
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-right: 1px solid var(--border);
  }

  .month-day-name:last-child { border-right: none; }
  .month-day-name.shabbat { color: var(--gold); opacity: 0.6; }

  .month-body { display: flex; flex-direction: column; }

  .month-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .month-row:last-child { border-bottom: none; }

  .month-cell {
    min-height: 110px;
    padding: 10px 8px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .month-cell:last-child { border-right: none; }
  .month-cell:hover { background: var(--bg-hover); }
  .month-cell.other-month { opacity: 0.3; }
  .month-cell.today { background: linear-gradient(135deg, var(--gold-dim), transparent); }
  .month-cell.today::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px;
    height: 100%;
    background: var(--gold);
  }
  .month-cell.has-holiday { background: linear-gradient(135deg, rgba(201,168,76,0.06), transparent); }

  .cell-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-prime);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .cell-num.today-num {
    width: 24px;
    height: 24px;
    background: var(--gold);
    color: #1a1000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .cell-hebrew { font-size: 10px; color: var(--text-mute); }
  .cell-holiday-tag { font-size: 10px; color: var(--gold); font-weight: 600; margin-top: 3px; display: block; }

  .cell-tasks { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }

  .cell-task {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }

  .cell-task.priority-high { background: var(--ember-dim); color: #9a1c0a; }
  .cell-task.priority-medium { background: var(--gold-dim); color: #7a5010; }
  .cell-task.priority-low { background: var(--sapphire-dim); color: #1a4a90; }
  .cell-task.done { opacity: 0.35; text-decoration: line-through; }

  .more-tasks { font-size: 10px; color: var(--text-mute); margin-top: 2px; }

  /* === YEAR VIEW === */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .year-month-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .year-month-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow-card); }

  .year-month-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-prime);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .year-month-header.current-month { background: var(--gold-dim); }
  .year-month-header.current-month span:first-child { color: var(--gold); }

  .year-mini-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 8px;
    gap: 1px;
  }

  .mini-day-name {
    text-align: center;
    font-size: 8px;
    color: var(--text-mute);
    font-weight: 700;
    padding: 2px 0;
  }

  .mini-day {
    text-align: center;
    font-size: 10px;
    padding: 3px 2px;
    border-radius: 4px;
    color: var(--text-sec);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .mini-day:hover { background: var(--bg-hover); }
  .mini-day.today { background: var(--gold); color: #1a1000; font-weight: 800; border-radius: 50%; }
  .mini-day.other { opacity: 0.25; }
  .mini-day.has-holiday::after { content: '◆'; position: absolute; bottom: -1px; right: 1px; font-size: 6px; color: var(--gold); }
  .mini-day.has-task::after { content: '•'; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 14px; color: var(--sapphire); line-height: 1; }
  .mini-day.has-holiday.has-task::after { color: var(--gold); }

  .year-month-summary {
    padding: 8px 14px;
    font-size: 10px;
    color: var(--text-mute);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(240,237,232,0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #ffffff;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    width: 100%;
    max-width: 460px;
    padding: 28px;
    box-shadow: var(--shadow-deep);
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-prime);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-title::before { content: '✦'; color: var(--gold); font-size: 14px; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-sec);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-prime);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--text-mute); }

  .priority-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .priority-opt {
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .priority-opt.high.selected { background: var(--ember-dim); border-color: var(--ember); color: #a02010; }
  .priority-opt.medium.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .priority-opt.low.selected { background: var(--sapphire-dim); border-color: var(--sapphire); color: #1a50a0; }
  .priority-opt:hover { border-color: var(--border-strong); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--border-strong); color: var(--text-prime); }

  .btn-save {
    flex: 2;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--gold), #7a5010);
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

  /* === UPCOMING SIDEBAR === */
  .layout-with-sidebar {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 16px;
    align-items: start;
  }

  .sidebar-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: sticky;
    top: 84px;
  }

  .sidebar-heading {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .upcoming-holiday {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .upcoming-holiday:last-child { border-bottom: none; }
  .upcoming-holiday:hover { background: var(--bg-hover); }

  .uh-name { font-size: 13px; font-weight: 600; color: var(--gold); }
  .uh-date { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
  .uh-countdown { font-size: 10px; color: var(--text-mute); margin-top: 3px; }

  /* === RESPONSIVE === */
  @media (max-width: 900px) {
    .layout-with-sidebar { grid-template-columns: 1fr; }
    .sidebar-panel { position: relative; top: 0; }
    .year-grid { grid-template-columns: repeat(2, 1fr); }
    .day-view { grid-template-columns: 1fr; }
    .day-sidebar { flex-direction: row; flex-wrap: wrap; }
    .day-date-card { flex: 1; min-width: 140px; }
    .day-tasks-count { flex: 1; min-width: 100px; }
    .day-timeline { grid-column: 1 / -1; }
    .header-inner { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 10px; }
    .header-nav .nav-btn { padding: 6px 10px; font-size: 12px; }
  }

  @media (max-width: 600px) {
    .app-body { padding: 8px; }
    .year-grid { grid-template-columns: repeat(2, 1fr); }
    .month-cell { min-height: 70px; padding: 6px 4px; }
    .cell-tasks { display: none; }
    .cell-num { font-size: 12px; }

    /* Week view: zero padding so grid fills edge-to-edge */
    #view-week .layout-with-sidebar { display: block; }
    .week-notebook {
      border-radius: 0;
      border-left: none;
      border-right: none;
    }

    /* === MOBILE DAY VIEW — compact, no scroll needed === */

    /* Hide the sidebar (date card + task count) — show as slim top strip */
    #view-day .layout-with-sidebar { display: block; }
    #view-day .sidebar-panel { display: none; }

    .day-view {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Sidebar becomes a horizontal strip */
    .day-sidebar {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .day-date-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      flex: 1;
      text-align: right;
    }

    .day-number {
      font-size: 36px;
      line-height: 1;
      flex-shrink: 0;
    }

    .day-name { font-size: 14px; margin-top: 0; }
    .day-month { font-size: 11px; }
    .day-hebrew { font-size: 10px; margin-top: 2px; }

    .day-tasks-count {
      padding: 10px 14px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .count-num { font-size: 22px; }
    .count-label { font-size: 11px; }

    /* Timeline takes full width, compact rows */
    .day-timeline {
      border-radius: var(--radius);
    }

    .timeline-header { padding: 10px 14px; font-size: 11px; }

    .time-slot { min-height: 42px; }

    .time-label {
      width: 48px;
      padding: 6px 8px;
      font-size: 10px;
    }

    .time-content { padding: 4px 8px; }

    .task-chip { font-size: 12px; padding: 4px 8px; }

    /* === MOBILE HEADER — 2 compact rows === */
    .app-header { padding: 0 12px; }

    .header-inner {
      flex-wrap: wrap;
      height: auto;
      padding: 8px 0 0;
      gap: 0;
    }

    /* Row 1: logo + add button */
    .logo { flex: 1; }
    .logo-text { font-size: 17px; }
    .logo-sub { display: none; }
    .logo-icon { width: 28px; height: 28px; font-size: 14px; }

    .add-task-btn {
      padding: 6px 13px;
      font-size: 12px;
      border-radius: 7px;
    }

    /* Row 2: view switcher + nav arrows + today — all in one line */
    .mobile-row2 {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0 8px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .mobile-row2 .header-nav {
      flex: 1;
      min-width: 0;
      padding: 3px;
      gap: 1px;
    }

    .nav-btn {
      padding: 5px 6px;
      font-size: 11px;
      border-radius: 5px;
    }

    /* Hide desktop controls, show mobile row */
    .header-controls { display: none; }

    /* Mobile nav controls — shifted slightly left to not crowd view buttons */
    .mobile-nav-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      margin-left: -12px;
    }

    .mobile-nav-controls .arrow-btn {
      width: 28px;
      height: 28px;
      font-size: 14px;
      border-radius: 7px;
    }

    .mobile-nav-controls .today-btn {
      padding: 4px 9px;
      font-size: 11px;
      border-radius: 7px;
      white-space: nowrap;
    }

    .mobile-current-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-prime);
      white-space: nowrap;
      text-align: center;
      min-width: 0;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }

  /* Mobile settings button — only shown on mobile, in logo row */
  .mobile-settings-btn {
    display: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    font-size: 16px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: auto;
    transition: border-color 0.15s;
  }
  .mobile-settings-btn:focus { outline: none; }

  @media (max-width: 600px) {
    .mobile-settings-btn { display: flex; }
  }
  .mobile-row2 { display: none; }

  @media (max-width: 600px) {
    /* Show mobile row, hide desktop duplicates */
    .mobile-row2 { display: flex; }
    /* Hide the desktop header-nav (the one between logo and controls) */
    .header-inner > .header-nav { display: none; }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-void); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-mute);
    font-size: 13px;
  }

  /* PWA Install Banner */
  .install-banner {
    position: fixed;
    bottom: 80px;
    left: 12px; right: 12px;
    background: var(--text-prime);
    color: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 800;
    box-shadow: var(--shadow-deep);
    direction: rtl;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .install-banner.show { opacity: 1; transform: translateY(0); }
  .install-icon { font-size: 24px; flex-shrink: 0; }
  .install-text { flex: 1; }
  .install-text strong { display: block; font-size: 14px; }
  .install-text span { font-size: 11px; opacity: 0.7; }
  .install-yes {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .install-no {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* =============================================
     FAB — Floating Action Button
     ============================================= */
  .fab {
    position: fixed;
    bottom: 28px;
    left: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #7a5010);
    color: #fff;
    font-size: 28px;
    line-height: 1;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(160,120,40,0.35);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 10px 30px rgba(160,120,40,0.45); }
  .fab:active { transform: scale(0.95); }
  .fab:focus { outline: none; }

  /* =============================================
     QUICK-ADD SHEET
     ============================================= */
  .qa-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .qa-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .qa-sheet {
    background: #fff;
    width: 100%;
    max-width: 520px;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
    max-height: 92vh;
    overflow-y: auto;
    direction: rtl;
  }
  .qa-overlay.open .qa-sheet { transform: translateY(0); }

  /* Header */
  .qa-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 2;
  }
  .qa-header-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-prime);
  }
  .qa-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--bg-hover);
    color: var(--text-sec);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qa-close:hover { background: var(--border); }
  .qa-save-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), #7a5010);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px var(--gold-glow);
    transition: transform 0.15s;
  }
  .qa-save-btn:active { transform: scale(0.92); }

  /* Title input */
  .qa-title-row { padding: 16px 20px 8px; }
  .qa-title-input {
    width: 100%;
    border: none;
    outline: none;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-prime);
    background: transparent;
    direction: rtl;
    caret-color: var(--gold);
  }
  .qa-title-input::placeholder { color: var(--text-mute); }

  /* Description */
  .qa-desc-row { padding: 0 20px 12px; }
  .qa-desc-input {
    width: 100%;
    border: none;
    outline: none;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    color: var(--text-sec);
    background: transparent;
    resize: none;
    direction: rtl;
    caret-color: var(--gold);
    line-height: 1.6;
  }
  .qa-desc-input::placeholder { color: #ccc; }

  .qa-divider {
    height: 8px;
    background: var(--bg-void);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Field rows */
  .qa-field-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
  }
  .qa-row-clickable { cursor: pointer; transition: background 0.12s; }
  .qa-row-clickable:hover { background: var(--bg-hover); }

  .qa-row-icon { font-size: 18px; flex-shrink: 0; }
  .qa-row-label { font-size: 14px; color: var(--text-sec); flex-shrink: 0; }
  .qa-row-value {
    flex: 1;
    text-align: left;
    font-size: 14px;
    color: var(--gold);
    font-weight: 600;
  }
  .qa-row-value.empty { color: var(--text-mute); font-weight: 400; }

  .qa-hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0; height: 0;
  }

  /* Repeat panel */
  .qa-repeat-panel {
    background: var(--bg-void);
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .qa-repeat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .qa-repeat-opt {
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .qa-repeat-opt.selected {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
    font-weight: 700;
  }

  /* Weekday picker */
  .qa-weekday-picker {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    justify-content: center;
  }
  .qa-wd {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 12px;
    font-family: 'Heebo', sans-serif;
    font-weight: 600;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .qa-wd.on { background: var(--gold); border-color: var(--gold); color: #fff; }

  /* Priority panel */
  .qa-priority-panel {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--bg-void);
    border-bottom: 1px solid var(--border);
  }
  .qa-pri-opt {
    flex: 1;
    padding: 9px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--text-sec);
  }
  .qa-pri-opt.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); font-weight: 700; }

  @media (min-width: 600px) {
    .qa-overlay { align-items: center; }
    .qa-sheet {
      border-radius: 16px;
      max-height: 85vh;
      margin-bottom: 0;
    }
  }

  /* =============================================
     SELECTION ACTION BAR
     ============================================= */
  .sel-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--text-prime);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 500;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    animation: slideUp 0.2s ease;
    direction: rtl;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .sel-count {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }

  .sel-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .sel-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .sel-btn:hover { opacity: 0.85; }

  .sel-move   { background: var(--gold); color: #fff; }
  .sel-delete { background: var(--ember); color: #fff; }
  .sel-cancel { background: rgba(255,255,255,0.15); color: #fff; }

  /* Selected line highlight */
  .wn-line.wn-selected {
    background: rgba(160,120,40,0.12) !important;
    border-right: 3px solid var(--gold);
  }

  /* Move sheet */
  .move-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    z-index: 1200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  .move-overlay.open { opacity: 1; pointer-events: all; }

  .move-sheet {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    direction: rtl;
  }
  .move-overlay.open .move-sheet { transform: translateY(0); }

  .move-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .move-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-prime);
  }
  .move-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  .move-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  @media (min-width: 600px) {
    .move-overlay { align-items: center; }
    .move-sheet { border-radius: 16px; max-width: 360px; }
  }

  /* =============================================
     SETTINGS PANEL
     ============================================= */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    z-index: 1100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: all; }

  .settings-panel {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow-deep);
    direction: rtl;
    transform: scale(0.95);
    transition: transform 0.22s;
    overflow: hidden;
  }
  .settings-overlay.open .settings-panel { transform: scale(1); }

  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .settings-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-prime);
  }

  .settings-section {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .settings-section:last-child { border-bottom: none; }

  .settings-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .settings-vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .vol-icon { font-size: 16px; flex-shrink: 0; }

  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 5px;
    border-radius: 3px;
    background: linear-gradient(to left, var(--gold) var(--pct, 50%), var(--border) var(--pct, 50%));
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 2px 6px var(--gold-glow);
    cursor: pointer;
    border: 2px solid #fff;
  }
  .vol-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid #fff;
  }

  .vol-value {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    min-width: 36px;
    text-align: center;
  }

  .vol-test-btn {
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-hover);
    color: var(--text-sec);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .vol-test-btn:hover { border-color: var(--gold); color: var(--gold); }

  .settings-notif-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-sec);
  }
  .notif-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--gold), #7a5010);
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }

  /* =============================================
     TASK ALARM TOAST
     ============================================= */
  .task-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #fff;
    border: 1px solid var(--border);
    border-right: 4px solid var(--gold);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    min-width: 260px;
    max-width: 340px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    direction: rtl;
  }

  .task-toast.toast-show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast-icon { font-size: 22px; flex-shrink: 0; }

  .toast-body { flex: 1; min-width: 0; }

  .toast-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-prime);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast-time {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
  }

  .toast-close {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    background: var(--bg-hover);
    color: var(--text-mute);
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .toast-close:hover { background: var(--border); }

  @media (max-width: 600px) {
    .task-toast {
      top: auto;
      bottom: 90px;
      left: 16px;
      right: 16px;
      transform: translateY(20px);
      max-width: none;
    }
    .task-toast.toast-show { transform: translateY(0); }
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
</style>

  '2026-04-04':'י"ז ניסן','2026-04-05':'י"ח ניסן','2026-04-06':'י"ט ניסן',
  '2026-04-07':'כ ניסן','2026-04-08':'כ"א ניסן','2026-04-09':'כ"ב ניסן',
  '2026-04-10':'כ"ג ניסן','2026-04-11':'כ"ד ניסן','2026-04-12':'כ"ה ניסן',

};

const DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTH_NAMES = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HOURS = ['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

// STATE

let currentView = 'week';
let currentDate = new Date();
let tasks = JSON.parse(localStorage.getItem('calTasks') || '[]');
let selectedPriority = 'medium';
let modalDate = null;

// ============================================================
// HOLIDAY HELPERS
// ============================================================
function getHolidaysForDate(ds) {
  return HOLIDAYS.filter(h => {
    if (h.minor) return false;
    const start = parseDate(h.date);
    const end = new Date(start);
    end.setDate(end.getDate() + h.duration - 1);
    const d = parseDate(ds);
    return d >= start && d <= end;
  });
}

function getAllHolidaysForDate(ds) {
  return HOLIDAYS.filter(h => {
    const start = parseDate(h.date);
    const end = new Date(start);
    end.setDate(end.getDate() + h.duration - 1);
    const d = parseDate(ds);
    return d >= start && d <= end;
  });
}

// Parse YYYY-MM-DD as LOCAL date (not UTC) to avoid timezone day-shift
function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getTasksForDate(ds) {
  const target = parseDate(ds);
  const targetDay = target.getDay(); // 0=Sun..6=Sat

  return tasks.filter(t => {
    if (!t.date) return false;
    const origin = parseDate(t.date);

    // Task hasn't started yet
    if (target < origin) return false;

    const repeat = t.repeat || 'none';

    // Non-recurring: exact date match
    if (repeat === 'none') return t.date === ds;

    // Recurring: check pattern
    const diffMs   = target - origin;
    const diffDays = Math.round(diffMs / 86400000);
    const diffMins = Math.round(diffMs / 60000);

    switch (repeat) {
      case 'hourly':
        // Show on origin date and every day after (alarm logic handles per-hour)
        return diffDays >= 0;

      case 'daily':
        return diffDays >= 0;

      case 'weekly':
        return diffDays >= 0 && diffDays % 7 === 0;

      case 'monthly': {
        if (target < origin) return false;
        const sameDay = origin.getDate() === target.getDate();
        const laterMonth =
          target.getFullYear() > origin.getFullYear() ||
          (target.getFullYear() === origin.getFullYear() &&
           target.getMonth() >= origin.getMonth());
        return sameDay && laterMonth;
      }

      case 'yearly': {
        const sameMonthDay =
          origin.getDate()  === target.getDate() &&
          origin.getMonth() === target.getMonth();
        return sameMonthDay && target.getFullYear() >= origin.getFullYear();
      }

      case 'weekdays': {
        // repeatDays is an array of weekday numbers [0..6]
        const days = t.repeatDays || [];
        return diffDays >= 0 && days.includes(targetDay);
      }

      case 'custom':
        // Fall back to exact date for custom (user manages manually)
        return t.date === ds;

      default:
        return t.date === ds;
    }
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(dir) {
  if (currentView === 'day') currentDate.setDate(currentDate.getDate() + dir);
  else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + dir * 7);
  else if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + dir);
  else if (currentView === 'year') currentDate.setFullYear(currentDate.getFullYear() + dir);
  render();
}

function goToToday() {
  currentDate = new Date();
  render();
}

function switchViewDirect(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => {
    const map = {'day':'יום','week':'שבוע','month':'חודש','year':'שנה'};
    b.classList.toggle('active', b.textContent === map[view]);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  render();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => {
    const map = {'day':'יום','week':'שבוע','month':'חודש','year':'שנה'};
    b.classList.toggle('active', b.textContent === map[view]);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  render();
}

// ============================================================
// RENDER DISPATCHER
// ============================================================
function render() {
  updateLabel();
  updateHolidayBanner();
  if (currentView === 'day') renderDay();
  else if (currentView === 'week') renderWeek();
  else if (currentView === 'month') renderMonth();
  else if (currentView === 'year') renderYear();
  renderUpcomingHolidays();
}

function updateLabel() {
  let text = '';
  if (currentView === 'day') text = `${currentDate.getDate()} ${MONTH_NAMES[currentDate.getMonth()]}`;
  else if (currentView === 'week') {
    const start = getWeekStart(currentDate);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    text = `${start.getDate()}–${end.getDate()} ${MONTH_NAMES[end.getMonth()]}`;
  }
  else if (currentView === 'month') text = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  else text = String(currentDate.getFullYear());

  const desktop = document.getElementById('currentLabel');
  const mobile = document.getElementById('mobileCurrentLabel');
  if (desktop) desktop.textContent = (currentView === 'day')
    ? `${DAY_NAMES[currentDate.getDay()]} ${currentDate.getDate()} ${MONTH_NAMES[currentDate.getMonth()]}`
    : text;
  if (mobile) mobile.textContent = text;
}

function updateHolidayBanner() {
  const banner = document.getElementById('holidayBanner');
  const ds = dateStr(currentView === 'day' ? currentDate : new Date());
  const holidays = getHolidaysForDate(ds);
  if (holidays.length && currentView === 'day') {
    banner.style.display = 'flex';
    banner.innerHTML = holidays.map(h =>
      `<span class="holiday-star">${h.icon}</span>
       <div><div class="holiday-text">${h.name}</div><div class="holiday-date">היום</div></div>`
    ).join('');
  } else {
    banner.style.display = 'none';
  }
}

// ============================================================
// DAY VIEW
// ============================================================
function renderDay() {
  const today = new Date();
  const ds = dateStr(currentDate);
  document.getElementById('dayNum').textContent = currentDate.getDate();
  document.getElementById('dayName').textContent = DAY_NAMES[currentDate.getDay()];
  document.getElementById('dayMonth').textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  document.getElementById('dayHebrew').textContent = HEBREW_DATES[ds] || '';

  const dayTasks = getTasksForDate(ds);
  document.getElementById('dayTaskCount').textContent = dayTasks.length;

  const timeline = document.getElementById('dayTimeline');
  timeline.innerHTML = '';

  HOURS.forEach(hour => {
    const [h] = hour.split(':');
    const slot = document.createElement('div');
    slot.className = 'time-slot';
    const slotTasks = dayTasks.filter(t => t.time && t.time.startsWith(h));
    slot.innerHTML = `<div class="time-label">${hour}</div><div class="time-content" id="slot-${h}"></div>`;
    timeline.appendChild(slot);
    slot.querySelector('.time-content').onclick = (e) => {
      if (e.target === slot.querySelector('.time-content')) {
        modalDate = ds;
        document.getElementById('taskTime').value = hour;
        openModal();
      }
    };
  });

  // Tasks without time
  const noTimeTasks = dayTasks.filter(t => !t.time);
  const noTimeSlot = document.createElement('div');
  noTimeSlot.className = 'time-slot';
  noTimeSlot.innerHTML = `<div class="time-label" style="color:var(--text-mute);font-size:10px">כל היום</div><div class="time-content"></div>`;
  timeline.insertBefore(noTimeSlot, timeline.firstChild);

  // Render tasks
  dayTasks.forEach(task => {
    const h = task.time ? task.time.split(':')[0] : null;
    const container = h
      ? document.getElementById('slot-' + h)
      : noTimeSlot.querySelector('.time-content');
    if (container) container.appendChild(createTaskChip(task));
  });
}

function createTaskChip(task) {
  const chip = document.createElement('div');
  chip.className = `task-chip priority-${task.priority}${task.done ? ' done' : ''}`;
  chip.innerHTML = `
    <div class="task-check" onclick="toggleTask('${task.id}', event)">${task.done ? '✓' : ''}</div>
    <span>${task.title}</span>
    ${task.note ? `<span style="font-size:11px;opacity:0.6">${task.note}</span>` : ''}
    <span class="task-delete" onclick="deleteTask('${task.id}', event)">✕</span>
  `;
  return chip;
}

// ============================================================
// WEEK VIEW
// ============================================================
// ============================================================
// INLINE QUICK-ADD (week view ruled lines)
// ============================================================
function activateInlineLine(line, ds) {
  // Only one active input at a time
  const existing = document.querySelector('.wn-inline-input');
  if (existing) existing.blur();

  line.classList.add('wn-editing');
  line.classList.remove('wn-line-empty');
  line.innerHTML = ''; // clear any ::after hint

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'wn-inline-input';
  input.placeholder = 'משימה חדשה...';
  input.setAttribute('autocomplete', 'off');
  line.appendChild(input);

  // Focus immediately — triggers keyboard on mobile
  input.focus();

  function commit() {
    const val = input.value.trim();
    if (val) {
      tasks.push({
        id: Date.now().toString(),
        title: val,
        date: ds,
        time: '',
        priority: 'medium',
        note: '',
        done: false,
        created: new Date().toISOString()
      });
      saveTasks();
    }
    renderWeek(); // re-render to show saved task / clean up
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { renderWeek(); } // cancel
  });

  input.addEventListener('blur', () => {
    // Small delay so tap on another line doesn't double-fire
    setTimeout(commit, 120);
  });
}

function activateInlineEdit(line, task) {
  // Already editing this line
  if (line.querySelector('.wn-inline-input')) return;

  // Grab the inner wrapper, replace text element with input
  const inner = line.querySelector('.wn-task-inner');
  const textEl = inner.querySelector('.wn-task-text');
  if (!textEl) return;

  line.classList.add('wn-editing');

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'wn-inline-input';
  input.value = task.title;
  input.setAttribute('autocomplete', 'off');

  // Replace text div with input in-place
  inner.replaceChild(input, textEl);

  input.focus();
  // Place cursor at end
  input.setSelectionRange(input.value.length, input.value.length);

  function commit() {
    const val = input.value.trim();
    if (!val) {
      // Empty → delete the task
      tasks = tasks.filter(t => t.id !== task.id);
      saveTasks();
    } else if (val !== task.title) {
      task.title = val;
      saveTasks();
    }
    renderWeek();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { renderWeek(); }
  });

  input.addEventListener('blur', () => {
    setTimeout(commit, 120);
  });
}

function getWeekStart(d) {
  const day = d.getDay(); // 0=Sun
  const start = new Date(d);
  start.setDate(d.getDate() - day);
  return start;
}

function renderWeek() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  const today = new Date();
  const weekStart = getWeekStart(currentDate);

  // How many ruled lines to show per day (tasks fill lines, rest are empty)
  const isMobile = window.innerWidth <= 640;
  const LINES_PER_DAY = isMobile ? 6 : 8;

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const ds = dateStr(d);
    const isToday = ds === dateStr(today);
    const hols = getAllHolidaysForDate(ds).filter(h => !h.minor);
    const dayTasks = getTasksForDate(ds);

    // Day card
    const card = document.createElement('div');
    card.className = `wn-day${isToday ? ' wn-today' : ''}`;

    // Header
    const header = document.createElement('div');
    header.className = 'wn-header';

    const labelWrap = document.createElement('div');
    labelWrap.style.cssText = 'display:flex;align-items:center;gap:4px;min-width:0;flex:1';

    const label = document.createElement('span');
    label.className = 'wn-day-label';
    label.textContent = `יום ${DAY_NAMES[d.getDay()]} ${d.getDate()} ב${MONTH_NAMES[d.getMonth()]}'`;
    labelWrap.appendChild(label);

    if (isToday) {
      const dot = document.createElement('span');
      dot.className = 'wn-today-dot';
      labelWrap.appendChild(dot);
    }

    if (hols.length) {
      // holiday shown in strip below header, not here
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'wn-add-btn';
    addBtn.textContent = '+';
    addBtn.title = 'הוסף משימה';
    addBtn.onclick = (e) => {
      e.stopPropagation();
      // Find first empty line in this card and activate it
      const emptyLine = card.querySelector('.wn-line-empty');
      if (emptyLine) {
        activateInlineLine(emptyLine, ds);
      } else {
        // All lines filled — fall back to modal
        modalDate = ds;
        document.getElementById('taskDate').value = ds;
        openModal();
      }
    };

    header.appendChild(labelWrap);
    header.appendChild(addBtn);
    header.onclick = (e) => {
      if (e.target === header || e.target === label) {
        currentDate = new Date(d);
        switchViewDirect('day');
      }
    };
    card.appendChild(header);

    // Holiday strip — subtle row below header
    if (hols.length) {
      const strip = document.createElement('div');
      strip.className = 'wn-holiday-strip';
      strip.innerHTML = hols.map(h =>
        `<span class="hol-icon">${h.icon}</span><span class="hol-name">${h.name}</span>`
      ).join('<span style="opacity:0.3;margin:0 2px">·</span>');
      card.appendChild(strip);
    }

    // Ruled lines
    const linesContainer = document.createElement('div');
    linesContainer.className = 'wn-lines';

    const totalLines = Math.max(LINES_PER_DAY, dayTasks.length);

    for (let l = 0; l < totalLines; l++) {
      const line = document.createElement('div');

      if (l < dayTasks.length) {
        // Task line
        const task = dayTasks[l];
        line.className = 'wn-line';

        const inner = document.createElement('div');
        inner.className = 'wn-task-inner';

        const check = document.createElement('div');
        check.className = `wn-check${task.done ? ' checked' : ''}`;
        check.innerHTML = task.done ? '✓' : '';
        check.onclick = (e) => { e.stopPropagation(); toggleTask(task.id); };

        const dot = document.createElement('div');
        dot.className = `wn-dot ${task.priority}`;

        const text = document.createElement('div');
        text.className = `wn-task-text${task.done ? ' done-text' : ''}`;
        text.textContent = task.title + (task.repeat && task.repeat !== 'none' ? ' 🔁' : '');

        const del = document.createElement('div');
        del.className = 'wn-del';
        del.innerHTML = '✕';
        del.onclick = (e) => { e.stopPropagation(); deleteTask(task.id); };

        inner.appendChild(check);
        inner.appendChild(dot);
        inner.appendChild(text);
        if (task.time) {
          const time = document.createElement('div');
          time.className = 'wn-task-time';
          time.textContent = task.time;
          inner.appendChild(time);
        }
        inner.appendChild(del);
        line.appendChild(inner);

        // Click on text area → inline edit (only when not in selection mode)
        text.onclick = (e) => {
          e.stopPropagation();
          if (selectedTaskIds.size > 0) {
            toggleTaskSelection(task.id, line);
          } else {
            activateInlineEdit(line, task);
          }
        };

        // Long-press to select
        let longPressTimer = null;
        const startLongPress = (e) => {
          longPressTimer = setTimeout(() => {
            e.preventDefault?.();
            toggleTaskSelection(task.id, line);
          }, 500);
        };
        const cancelLongPress = () => clearTimeout(longPressTimer);
        line.addEventListener('mousedown', startLongPress);
        line.addEventListener('touchstart', startLongPress, { passive: true });
        line.addEventListener('mouseup', cancelLongPress);
        line.addEventListener('mouseleave', cancelLongPress);
        line.addEventListener('touchend', cancelLongPress);
        line.addEventListener('touchcancel', cancelLongPress);

      } else {
        // Empty ruled line — tap to type inline
        line.className = 'wn-line wn-line-empty';
        line.onclick = () => activateInlineLine(line, ds);
      }

      linesContainer.appendChild(line);
    }

    card.appendChild(linesContainer);
    grid.appendChild(card);
  }
}

// ============================================================
// MONTH VIEW
// ============================================================
function renderMonth() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  const today = new Date();
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  // Header row
  const headerRow = document.createElement('div');
  headerRow.className = 'month-header-row';
  DAY_NAMES.forEach((name, i) => {
    const cell = document.createElement('div');
    cell.className = `month-day-name${i===6?' shabbat':''}`;
    cell.textContent = name.slice(0,1) + name.slice(1,2);
    headerRow.appendChild(cell);
  });
  grid.appendChild(headerRow);

  // Body
  const body = document.createElement('div');
  body.className = 'month-body';

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ day: prevMonthDays - i, otherMonth: true, date: new Date(year, month - 1, prevMonthDays - i) });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ day: i, otherMonth: false, date: new Date(year, month, i) });
  while (cells.length % 7 !== 0) {
    const n = cells.length - daysInMonth - firstDay + 1;
    cells.push({ day: n, otherMonth: true, date: new Date(year, month + 1, n) });
  }

  for (let r = 0; r < cells.length / 7; r++) {
    const row = document.createElement('div');
    row.className = 'month-row';
    for (let c = 0; c < 7; c++) {
      const cell = cells[r * 7 + c];
      const ds = dateStr(cell.date);
      const hols = getAllHolidaysForDate(ds);
      const isToday = ds === dateStr(today);
      const dayTasks = getTasksForDate(ds);
      const div = document.createElement('div');
      div.className = `month-cell${cell.otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}${hols.length ? ' has-holiday' : ''}`;

      let numHtml = isToday
        ? `<span class="today-num">${cell.day}</span>`
        : `<span>${cell.day}</span>`;

      div.innerHTML = `
        <div class="cell-num">${numHtml}<span class="cell-hebrew">${HEBREW_DATES[ds] || ''}</span></div>
        ${hols.filter(h => !h.minor).map(h => `<span class="cell-holiday-tag">${h.icon} ${h.name}</span>`).join('')}
        <div class="cell-tasks">${dayTasks.slice(0,3).map(t =>
          `<div class="cell-task priority-${t.priority}${t.done?' done':''}">${t.title}</div>`
        ).join('')}${dayTasks.length>3?`<div class="more-tasks">+${dayTasks.length-3} עוד</div>`:''}</div>
      `;

      div.onclick = () => {
        currentDate = new Date(cell.date);
        switchView('day');
        document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
      };

      row.appendChild(div);
    }
    body.appendChild(row);
  }
  grid.appendChild(body);
}

// YEAR VIEW
// ============================================================
function renderYear() {
  const grid = document.getElementById('yearGrid');
  grid.innerHTML = '';
  const today = new Date();
  const year = currentDate.getFullYear();

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'year-month-card';
    const isCurrent = today.getFullYear() === year && today.getMonth() === m;

    const header = document.createElement('div');
    header.className = `year-month-header${isCurrent ? ' current-month' : ''}`;
    const hKey = `${year}-${String(m+1).padStart(2,'0')}`;
    header.innerHTML = `<span>${MONTH_NAMES[m]}</span><span style="font-size:10px;color:var(--text-mute)">${HEBREW_MONTHS[hKey]||''}</span>`;
    card.appendChild(header);

    const mini = document.createElement('div');
    mini.className = 'year-mini-days';
    DAY_NAMES.forEach(n => {
      const dn = document.createElement('div');
      dn.className = 'mini-day-name';
      dn.textContent = n[0];
      mini.appendChild(dn);
    });

    const firstDay = new Date(year, m, 1).getDay();
    const daysInMonth = new Date(year, m + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const e = document.createElement('div'); e.className = 'mini-day other'; e.textContent = ' '; mini.appendChild(e);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = ds === dateStr(today);
      const hasHol = getHolidaysForDate(ds).length > 0;
      const hasTask = getTasksForDate(ds).length > 0;
      const el = document.createElement('div');
      el.className = `mini-day${isToday?' today':''}${hasHol?' has-holiday':''}${hasTask&&!hasHol?' has-task':''}`;
      el.textContent = d;
      el.onclick = () => {
        currentDate = new Date(year, m, d);
        switchView('day');
        document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
      };
      mini.appendChild(el);
    }
    card.appendChild(mini);

    const monthTasks = tasks.filter(t => t.date && t.date.startsWith(hKey));
    const monthHols = HOLIDAYS.filter(h => h.date.startsWith(hKey));
    const summary = document.createElement('div');
    summary.className = 'year-month-summary';
    summary.innerHTML = `
      ${monthTasks.length ? `<span>📌 ${monthTasks.length} משימות</span>` : ''}
      ${monthHols.length ? `<span>✦ ${monthHols.length} חגים</span>` : ''}
    `;
    card.appendChild(summary);

    card.onclick = (e) => {
      if (e.target === card || e.target === header) {
        currentDate = new Date(year, m, 1);
        currentView = 'month';
        document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===2));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-month').classList.add('active');
        render();
      }
    };
    grid.appendChild(card);
  }
}

// ============================================================
// UPCOMING HOLIDAYS SIDEBAR
// ============================================================
function renderUpcomingHolidays() {
  const ids = ['upcomingSidebar', 'upcomingSidebarMonth'];
  const today = new Date();
  const upcoming = HOLIDAYS.filter(h => !h.minor && new Date(h.date) >= today)
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .slice(0, 8);

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = `<div class="sidebar-heading">חגים קרובים</div>`;
    upcoming.forEach(h => {
      const hDate = new Date(h.date);
      const diff = Math.ceil((hDate - today) / (1000 * 60 * 60 * 24));
      const div = document.createElement('div');
      div.className = 'upcoming-holiday';
      div.innerHTML = `
        <div class="uh-name">${h.icon} ${h.name}</div>
        <div class="uh-date">${h.date.split('-').reverse().join('/')}</div>
        <div class="uh-countdown">${diff === 0 ? 'היום!' : diff === 1 ? 'מחר' : `בעוד ${diff} ימים`}</div>
      `;
      div.onclick = () => {
        currentDate = new Date(h.date);
        if (currentView === 'year' || currentView === 'month') currentView = 'month';
        else currentView = 'day';
        render();
      };
      el.appendChild(div);
    });
  });
}

// QUICK-ADD SHEET
// ============================================================

let qaSelectedDays = [];
let qaPriority = 'medium';

  none: 'ללא חזרה', hourly: 'כל שעה', daily: 'כל יום',
  weekly: 'כל שבוע', monthly: 'כל חודש', yearly: 'כל שנה',
  weekdays: 'ימים נבחרים', custom: 'מותאם אישית'
};

function openQuickAdd(ds) {
  qaRepeat = 'none';
  qaSelectedDays = [];
  qaPriority = 'medium';

  const overlay = document.getElementById('qaOverlay');
  document.getElementById('qaTitleInput').value = '';
  document.getElementById('qaDescInput').value = '';
  document.getElementById('qaDateInput').value = ds || dateStr(new Date());

  document.getElementById('qaRepeatPanel').style.display = 'none';
  document.getElementById('qaPriorityPanel').style.display = 'none';
  document.getElementById('qaWeekdayPicker').style.display = 'none';

  document.getElementById('qaPriorityDisplay').textContent = 'בינונית';

function qaCloseOutside(e) {

function updateDateDisplay() {
  const val = document.getElementById('qaDateInput').value;
  const el = document.getElementById('qaDateDisplay');

function updateTimeDisplay() {

  const el = document.getElementById('qaTimeDisplay');

function togglePriorityPanel() {

// TASK SELECTION (long-press multi-select)
// ============================================================
let selectedTaskIds = new Set();

function toggleTaskSelection(id, lineEl) {

function deleteSelected() {

// ============================================================
// SWIPE GESTURES
// ============================================================
(function() {
  let startX = 0, startY = 0, startT = 0;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', e => {
    // Ignore if quick-add sheet is open
    if (document.getElementById('qaOverlay').classList.contains('open')) return;
    // Only handle day / week / month views
    if (!['day','week','month'].includes(currentView)) return;

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startT;

    // Must be fast enough, mostly horizontal, and long enough
    if (dt > 400) return;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dy) > Math.abs(dx) * 0.8) return; // too vertical

    // RTL layout: swipe RIGHT = next/forward, swipe LEFT = back/prev
    if (dx > 0) navigate(1);   // swipe right → next
    else navigate(-1);          // swipe left → prev
  }, { passive: true });
})();

// ============================================================
// TASK ALARM SYSTEM
// ============================================================
const notifiedTasks = new Set(JSON.parse(sessionStorage.getItem('notifiedTasks') || '[]'));

let alarmVolume = parseFloat(localStorage.getItem('alarmVolume') || '0.5');

function playAlarmSound(vol) {
  const v = vol !== undefined ? vol : alarmVolume;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const playTone = (freq, startTime, duration, volume) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.05);
    };

    const t = ctx.currentTime;
    playTone(523, t,        0.18, v);
    playTone(659, t + 0.2,  0.18, v);
    playTone(784, t + 0.4,  0.28, v);
    playTone(784, t + 0.72, 0.28, v);
  } catch(e) {
    console.warn('Audio not available:', e);
  }
}

function showTaskAlert(task) {
  const toast = document.createElement('div');
  toast.className = 'task-toast';
  toast.innerHTML = `
    <div class="toast-icon">⏰</div>
    <div class="toast-body">
      <div class="toast-title">${task.title}</div>
      <div class="toast-time">${task.time} · עכשיו</div>
    </div>
    <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('toast-show'), 50);
  setTimeout(() => {
    toast.classList.remove('toast-show');
    setTimeout(() => toast.remove(), 400);
  }, 8000);
}

function checkTaskAlarms() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const currentTime = `${h}:${m}`;
  const todayStr = dateStr(now);

  // Use getTasksForDate so recurring tasks are included
  getTasksForDate(todayStr).forEach(task => {
    if (task.done) return;
    if (!task.time) return;
    if (task.time !== currentTime) return;

    // Use today's date in the key so recurring tasks fire every occurrence
    const alarmKey = `${task.id}-${todayStr}-${task.time}`;
    if (notifiedTasks.has(alarmKey)) return;

    notifiedTasks.add(alarmKey);
    sessionStorage.setItem('notifiedTasks', JSON.stringify([...notifiedTasks]));

    playAlarmSound();
    showTaskAlert(task);

    if (Notification.permission === 'granted') {
      new Notification('⏰ ' + task.title, {
        body: `${task.time} — הגיע הזמן!`,
        tag: alarmKey
      });
    }
  });
}

function requestNotificationPermission(manual) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default' || manual) {
    Notification.requestPermission().then(updateNotifStatus);
  }
  updateNotifStatus();
}

function updateNotifStatus() {
  const text = document.getElementById('notifStatusText');
  const btn = document.getElementById('notifBtn');
  if (!text || !('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    text.textContent = '✅ התראות מופעלות';
    btn.style.display = 'none';
  } else if (Notification.permission === 'denied') {
    text.textContent = '❌ חסומות בדפדפן';
    btn.style.display = 'none';
  } else {
    text.textContent = 'לא הופעלו עדיין';
    btn.style.display = 'block';
  }
}

// ============================================================
// PWA — SERVICE WORKER & INSTALL
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('SW registered:', reg.scope);

    // Ask for push permission and schedule alarms via SW
    if ('Notification' in window && Notification.permission === 'granted') {
      schedulePushAlarms(reg);
    }
  }).catch(err => console.warn('SW registration failed:', err));
}

function schedulePushAlarms(reg) {
  // Send today's tasks with times to SW so it can schedule alarms
  const todayStr = dateStr(new Date());
  const todayTasks = getTasksForDate(todayStr).filter(t => !t.done && t.time);
  if (reg.active) {
    reg.active.postMessage({ type: 'SCHEDULE_ALARMS', tasks: todayTasks, date: todayStr });
  }
}

// Re-schedule when tasks change
const _origSaveTasks = saveTasks;
function saveTasks() {
  _origSaveTasks();
  navigator.serviceWorker?.ready.then(reg => schedulePushAlarms(reg));
}

// PWA install banner
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (localStorage.getItem('pwaInstalled')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.className = 'install-banner';
  banner.innerHTML = `
    <span class="install-icon">📲</span>
    <div class="install-text">
      <strong>התקן את היומן</strong>
      <span>עבוד גם ללא אינטרנט</span>
    </div>
    <button class="install-yes" onclick="triggerInstall()">התקן</button>
    <button class="install-no" onclick="dismissInstall()">✕</button>
  `;
  document.body.appendChild(banner);
  setTimeout(() => banner.classList.add('show'), 100);
}

function triggerInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') {
      localStorage.setItem('pwaInstalled', '1');
      document.getElementById('installBanner')?.remove();
    }
  });
}

function dismissInstall() {
  document.getElementById('installBanner')?.remove();
  localStorage.setItem('pwaInstalled', '1');
}
render();
